<!DOCTYPE html>
<html>
<head>
  <title>Identity Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      text-align: center;
    }

    .container {
      width: 500px;
      margin: auto;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      text-align: left;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    .tabs button {
      background: #334155;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .verified {
      background: #22c55e;
    }

    .notverified {
      background: #ef4444;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🔐 Identity Dashboard</h2>

  <button onclick="connectWallet()">Connect Wallet</button>
  <p id="wallet"></p>

  <!-- Tabs -->
  <div class="tabs">
    <button onclick="showTab('register')">Register</button>
    <button onclick="showTab('admin')">Admin</button>
    <button onclick="showTab('access')">Access</button>
    <button onclick="showTab('query')">Query</button>
  </div>

  <!-- REGISTER -->
  <div id="register" class="card">
    <h3>Register Identity</h3>
    <input type="text" id="ipfsHash" placeholder="Enter IPFS Hash">
    <button onclick="createIdentity()">Register</button>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="card" style="display:none;">
    <h3>Verify Identity Status</h3>
    <input type="text" id="verifyAddress" placeholder="User Address">
    <button onclick="checkVerification()">Check</button>
    <p id="verifyResult"></p>
  </div>

  <!-- ACCESS -->
  <div id="access" class="card" style="display:none;">
    <h3>Access Control</h3>
    <input type="text" id="verifierAddress" placeholder="Verifier Address">
    <button onclick="grantAccess()">Grant</button>
    <button onclick="revokeAccess()">Revoke</button>
  </div>

  <!-- QUERY -->
  <div id="query" class="card" style="display:none;">
    <h3>Get Identity</h3>
    <input type="text" id="userAddress" placeholder="User Address">
    <button onclick="getIdentity()">Get</button>
    <p id="identityResult"></p>
  </div>

</div>

<script>
let contract, signer;

const contractAddress = "YOUR_CONTRACT_ADDRESS";

const abi = [
  "function createIdentity(string memory _ipfsHash)",
  "function grantAccess(address verifier)",
  "function revokeAccess(address verifier)",
  "function getIdentity(address user) view returns (string memory)",
  "function verifyIdentity(address user, string memory hash) view returns (bool)"
];

// Wallet
async function connectWallet() {
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();

  contract = new ethers.Contract(contractAddress, abi, signer);

  document.getElementById("wallet").innerText =
    "Connected: " + await signer.getAddress();
}

// Tabs
function showTab(tab) {
  document.getElementById("register").style.display = "none";
  document.getElementById("admin").style.display = "none";
  document.getElementById("access").style.display = "none";
  document.getElementById("query").style.display = "none";

  document.getElementById(tab).style.display = "block";
}

// Register
async function createIdentity() {
  const hash = document.getElementById("ipfsHash").value;
  await (await contract.createIdentity(hash)).wait();
  alert("Identity Registered!");
}

// Access
async function grantAccess() {
  const addr = document.getElementById("verifierAddress").value;
  await (await contract.grantAccess(addr)).wait();
  alert("Access Granted!");
}

async function revokeAccess() {
  const addr = document.getElementById("verifierAddress").value;
  await (await contract.revokeAccess(addr)).wait();
  alert("Access Revoked!");
}

// Query
async function getIdentity() {
  const addr = document.getElementById("userAddress").value;
  try {
    const hash = await contract.getIdentity(addr);
    document.getElementById("identityResult").innerText =
      "IPFS: " + hash;
  } catch {
    document.getElementById("identityResult").innerText =
      "❌ Access Denied";
  }
}

// Admin Verify (basic demo)
function checkVerification() {
  const addr = document.getElementById("verifyAddress").value;

  document.getElementById("verifyResult").innerHTML =
    `<span class="badge notverified">${addr} Not Verified</span>`;
}
</script>

</body>
</html>
