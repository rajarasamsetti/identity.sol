<!DOCTYPE html>
<html>
<head>
  <title>Selective Identity Sharing</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      width: 500px;
      margin: auto;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      text-align: left;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .request {
      background: #334155;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>🔐 Identity Sharing System</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="wallet"></p>

<!-- USER PANEL -->
<div class="card">
  <h3>User Panel</h3>
  <input id="identityHash" placeholder="Enter IPFS Hash">
  <button onclick="storeIdentity()">Store Identity</button>

  <h4>Pending Requests</h4>
  <div id="requests"></div>
</div>

<!-- VERIFIER PANEL -->
<div class="card">
  <h3>Verifier Panel</h3>
  <input id="userAddress" placeholder="User Address">
  <button onclick="requestAccess()">Request Access</button>

  <button onclick="getIdentity()">View Identity</button>
  <p id="result"></p>
</div>

</div>

<script>
let contract, signer;
let currentUser;

// TEMP: local request store (simulate blockchain events)
let requests = [];

const contractAddress = "YOUR_CONTRACT_ADDRESS";

const abi = [
  "function createIdentity(string memory _ipfsHash)",
  "function grantAccess(address verifier)",
  "function getIdentity(address user) view returns (string memory)"
];

// CONNECT WALLET
async function connectWallet() {
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();

  contract = new ethers.Contract(contractAddress, abi, signer);

  currentUser = await signer.getAddress();
  document.getElementById("wallet").innerText = "Connected: " + currentUser;

  renderRequests();
}

// STORE IDENTITY
async function storeIdentity() {
  const hash = document.getElementById("identityHash").value;
  await (await contract.createIdentity(hash)).wait();
  alert("Identity Stored!");
}

// REQUEST ACCESS (Verifier)
function requestAccess() {
  const userAddr = document.getElementById("userAddress").value;

  requests.push({
    user: userAddr,
    verifier: currentUser,
    status: "pending"
  });

  alert("Request Sent!");
  renderRequests();
}

// SHOW REQUESTS (User)
function renderRequests() {
  const container = document.getElementById("requests");
  container.innerHTML = "";

  requests.forEach((req, index) => {
    if (req.user.toLowerCase() === currentUser?.toLowerCase() && req.status === "pending") {
      container.innerHTML += `
        <div class="request">
          Verifier: ${req.verifier}
          <br>
          <button onclick="approve(${index})">Approve</button>
          <button onclick="reject(${index})">Reject</button>
        </div>
      `;
    }
  });
}

// APPROVE
async function approve(index) {
  const req = requests[index];

  await (await contract.grantAccess(req.verifier)).wait();
  requests[index].status = "approved";

  alert("Access Approved!");
  renderRequests();
}

// REJECT
function reject(index) {
  requests[index].status = "rejected";
  alert("Request Rejected!");
  renderRequests();
}

// GET IDENTITY (Verifier)
async function getIdentity() {
  const addr = document.getElementById("userAddress").value;

  try {
    const hash = await contract.getIdentity(addr);
    document.getElementById("result").innerText =
      "Identity Hash: " + hash;
  } catch {
    document.getElementById("result").innerText =
      "❌ Access Denied";
  }
}
</script>

</body>
</html>
