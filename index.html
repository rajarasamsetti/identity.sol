<!DOCTYPE html>
<html>
<head>
  <title>Digital Identity Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      background: #121212;
      color: #e5e5e5;
      font-family: Arial;
      margin: 0;
    }

    .container {
      width: 800px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .tabs button {
      background: #1f1f1f;
      border: 1px solid #333;
      color: white;
      padding: 8px 14px;
      margin-right: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 10px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #121212;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
    }

    button.action {
      margin-top: 12px;
      padding: 10px 14px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    label {
      font-size: 13px;
      color: #aaa;
    }

    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
    }

    .success { background: #166534; }
    .fail { background: #7f1d1d; }
  </style>
</head>

<body>

<div class="container">

  <div class="topbar">
    <b>Digital Identity Registry</b><br>
    <small id="wallet">Wallet: Not Connected</small>
  </div>

  <button class="action" onclick="connectWallet()">Connect Wallet</button>

  <div class="tabs">
    <button onclick="showTab('register')">Register</button>
    <button onclick="showTab('access')">Access</button>
    <button onclick="showTab('query')">Query</button>
  </div>

  <!-- REGISTER -->
  <div id="register" class="card">
    <h3>REGISTER IDENTITY</h3>

    <label>Identity Data (will be hashed)</label>
    <input id="identityInput" placeholder="e.g. Raja|1990|Aadhaar1234" oninput="computeHash()">

    <label>Computed Hash</label>
    <input id="hashOutput" disabled>

    <button class="action" onclick="registerIdentity()">Register Identity →</button>
  </div>

  <!-- ACCESS -->
  <div id="access" class="card" style="display:none;">
    <h3>ACCESS CONTROL</h3>

    <label>Verifier Address</label>
    <input id="verifierAddr" placeholder="0x...">

    <button class="action" onclick="grantAccess()">Grant Access</button>
    <button class="action" onclick="revokeAccess()">Revoke Access</button>
  </div>

  <!-- QUERY -->
  <div id="query" class="card" style="display:none;">
    <h3>VERIFY IDENTITY STATUS</h3>

    <label>User Address</label>
    <input id="userAddr" placeholder="0x...">

    <button class="action" onclick="getIdentity()">Check →</button>

    <div id="result"></div>
  </div>

</div>

<script>
let contract, signer;

const contractAddress = "YOUR_CONTRACT_ADDRESS";

const abi = [
  "function createIdentity(string memory _ipfsHash)",
  "function grantAccess(address verifier)",
  "function revokeAccess(address verifier)",
  "function getIdentity(address user) view returns (string memory)"
];

// Wallet connect
async function connectWallet() {
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();

  contract = new ethers.Contract(contractAddress, abi, signer);

  document.getElementById("wallet").innerText =
    "Wallet: " + await signer.getAddress();
}

// Tabs
function showTab(tab) {
  ["register","access","query"].forEach(id=>{
    document.getElementById(id).style.display = "none";
  });
  document.getElementById(tab).style.display = "block";
}

// Auto hash
function computeHash() {
  const input = document.getElementById("identityInput").value;
  const hash = ethers.utils.keccak256(
    ethers.utils.toUtf8Bytes(input)
  );
  document.getElementById("hashOutput").value = hash;
}

// Register
async function registerIdentity() {
  const hash = document.getElementById("hashOutput").value;
  await (await contract.createIdentity(hash)).wait();
  alert("Identity Registered!");
}

// Access
async function grantAccess() {
  const addr = document.getElementById("verifierAddr").value;
  await (await contract.grantAccess(addr)).wait();
  alert("Access Granted!");
}

async function revokeAccess() {
  const addr = document.getElementById("verifierAddr").value;
  await (await contract.revokeAccess(addr)).wait();
  alert("Access Revoked!");
}

// Query
async function getIdentity() {
  const addr = document.getElementById("userAddr").value;

  try {
    const hash = await contract.getIdentity(addr);
    document.getElementById("result").innerHTML =
      `<div class="status success">✅ Verified<br>${hash}</div>`;
  } catch {
    document.getElementById("result").innerHTML =
      `<div class="status fail">❌ Access Denied</div>`;
  }
}
</script>

</body>
</html>
